name: Update Manifests
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build generator
        run: |
          cd tools/manifest-generator
          go build -o manifest-generator .

      - name: Generate manifests
        run: |
          cd tools/manifest-generator
          ./manifest-generator -manifest-dir ../../manifests -max-versions 10 -workers 3 -min-major 9

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifests/
          NEW_FILES=$(git diff --cached --name-only --diff-filter=A)
          if [ -n "$NEW_FILES" ]; then
            VERSIONS=$(echo "$NEW_FILES" | cut -d'/' -f4 | sort -u | tr '\n' ', ' | sed 's/, $//')
            git commit -m "Add manifests for: $VERSIONS"
            git push
          else
            echo "No new manifests to commit"
          fi
